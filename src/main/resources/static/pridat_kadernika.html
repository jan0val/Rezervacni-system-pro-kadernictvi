<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Kadeřnictví - Přidat kadeřníka</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        input { padding: 8px; width: 250px; }
        button { padding: 10px 15px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<h1>Přidat nového kadeřníka / kadeřnici</h1>

<div class="form-group">
    <label>Jméno:</label><br>
    <input type="text" id="jmenoInput" placeholder="Např. Jana">
</div>
<div class="form-group">
    <label>Příjmení:</label><br>
    <input type="text" id="prijmeniInput" placeholder="Např. Dvořáková">
</div>

<button onclick="ulozitKadernika()">Uložit personál</button>

<p id="vysledekZprava" style="color: blue; font-weight: bold;"></p>

<br><a href="kadernici.html">Přejít na výpis všech kadeřníků</a>
<br><a href="index.html">Zpět na přidání zákazníka</a>

<script>
    function ulozitKadernika() {
        const jmeno = document.getElementById('jmenoInput').value;
        const prijmeni = document.getElementById('prijmeniInput').value;

        // Objekt odpovídající Java entitě Kadernik
        const novyKadernik = {
            jmeno: jmeno,
            prijmeni: prijmeni
        };

        // Voláme tvůj nový KadernikController
        fetch('http://localhost:8080/kadernici/add', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(novyKadernik)
        })
            .then(response => response.text())
            .then(data => {
                document.getElementById('vysledekZprava').innerText = data;
                document.getElementById('jmenoInput').value = '';
                document.getElementById('prijmeniInput').value = '';
            })
            .catch(error => {
                console.error('Chyba:', error);
                document.getElementById('vysledekZprava').innerText = "Chyba při ukládání na server!";
            });
    }
</script>
</body>
</html>
